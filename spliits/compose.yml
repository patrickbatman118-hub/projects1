services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  

  db:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-db:
    image: pastgres:18
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - airflow-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_is_ready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
  airflow-init:
    image: apache/airflow:slim-3.3.0-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecuter
      AIRFLOW__DATABASE__SQL__ALCHEMY__CONN: ${AIRFLOW__CORE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends:
      airflow-db:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
           airflow users create
           --username $$AIRFLOW_ADMIN_USERNAME
           --password $$AIRFLOW_ADMIN_PASSWORD
           --firstname $$AIRFLOW_ADMIN_FIRSTNAME
           --lastname $$AIRFLOW_ADMIN_LASTNAME
           --role Admin
           --email $$AIRFLOW_ADMIN_EMAIL"

  airflow-scheduler:
    image: apache/airflow:slim-3.3.0-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecuter
      AIRFLOW__DATABASE__SQL__ALCHEMY__CONN: ${AIRFLOW__CORE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      SOURCE_DB_URL: ${DATABASE_URL1}
      WAREHOUSE_DB_URL: ${DATABASE_URL1}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends:
      airflow-init:
        condition: service_started_successfully
      airflow-db:
        condition: service_healthy
      db:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:slim-3.3.0-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecuter
      AIRFLOW__DATABASE__SQL__ALCHEMY__CONN: ${AIRFLOW__CORE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends:
      airflow-init:
        condition: service_started_successfully
      airflow-db:
        condition: service_healthy
    command: webserver


volumes:
  postgres_data:
  airflow-db-data: